<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body {
            font-family: Arial;
            background-color: #d67e7e;
        }

        .login-box {
            width: 300px;
            margin: 150px auto;
            padding: 20px;
            background: rgb(230, 99, 99);
            text-align: center;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
        }
    </style>

</head>

<body>

    <div class="login-box">
        <h2>Login</h2>

        <input type="text" id="username" placeholder="Enter Username"><br><br>
        <input type="password" id="password" placeholder="Enter Password"><br><br>

        <button onclick="login()">Login</button>
    </div>

    <script>
        function login() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;

            if(user == "srii" && pass == "1234") {
                window.location.href = "srii.html";
            } else {
                alert("Invalid Username or Password");
            }
        }
    </script>

</body>
</html>
